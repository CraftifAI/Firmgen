<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftifAI — Error</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2e3245;
      --text:    #e2e8f0;
      --muted:   #8892a4;
      --error:   #f87171;
      --radius:  10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 44px;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .icon { font-size: 48px; margin-bottom: 16px; }

    h2 { font-size: 18px; margin-bottom: 8px; color: var(--error); }

    p { color: var(--muted); margin-bottom: 20px; line-height: 1.6; }

    .error-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      text-align: left;
      font-family: monospace;
      font-size: 12px;
      color: var(--error);
      word-break: break-word;
      margin-bottom: 24px;
      max-height: 120px;
      overflow-y: auto;
    }

    .btn-row { display: flex; gap: 12px; justify-content: center; }

    .btn {
      padding: 10px 22px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .btn-primary { background: #4f8ef7; color: #fff; }
    .btn-primary:hover { background: #6ba3ff; }

    .btn-ghost {
      background: var(--border);
      color: var(--text);
    }
    .btn-ghost:hover { background: #3a3f56; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">⚠️</div>
    <h2>Failed to start services</h2>
    <p>Something went wrong while launching the agent. See the error details below.</p>
    <div class="error-box" id="error-box">Unknown error</div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="openLogs()">View Logs</button>
      <button class="btn btn-ghost" onclick="resetSetup()">Reset Setup</button>
      <button class="btn btn-primary" onclick="retryLaunch()">Retry</button>
    </div>
  </div>

  <script>
    if (window.craftifai) {
      window.craftifai.onError(msg => {
        document.getElementById('error-box').textContent = msg;
      });
    }

    function openLogs() {
      window.craftifai?.openLogs();
    }

    function resetSetup() {
      if (confirm('This will reset all settings and show the setup wizard again. Continue?')) {
        window.craftifai?.resetSettings();
      }
    }

    function retryLaunch() {
      location.reload();
    }
  </script>
</body>
</html>
