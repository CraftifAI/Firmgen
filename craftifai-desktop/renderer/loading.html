<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftifAI — Starting…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0f1117;
      --text:   #e2e8f0;
      --muted:  #8892a4;
      --accent: #4f8ef7;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .logo-chip {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #4f8ef7 0%, #7c3aed 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    h1 { font-size: 20px; font-weight: 700; }

    .status {
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
      text-align: center;
    }

    /* Animated progress bar */
    .progress-track {
      width: 280px;
      height: 3px;
      background: #1e2235;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      animation: indeterminate 1.5s ease-in-out infinite;
      transform-origin: left;
    }

    @keyframes indeterminate {
      0%   { transform: scaleX(0)   translateX(0%); }
      50%  { transform: scaleX(0.4) translateX(130%); }
      100% { transform: scaleX(0)   translateX(400%); }
    }

    .dots span {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 3px;
      animation: bounce 1.2s ease-in-out infinite;
    }

    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-8px); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="logo-chip">⚡</div>
  <h1>CraftifAI ESP32 Agent</h1>
  <div class="dots">
    <span></span><span></span><span></span>
  </div>
  <div class="progress-track"><div class="progress-bar"></div></div>
  <p class="status" id="status-text">Initializing…</p>

  <script>
    // Listen for status updates from main process
    if (window.craftifai) {
      window.craftifai.onStatus(msg => {
        document.getElementById('status-text').textContent = msg;
      });
    }
  </script>
</body>
</html>
